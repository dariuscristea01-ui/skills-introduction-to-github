<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #fff;
    }
    canvas {
      border: 2px solid #fff;
      display: block;
    }
    #info {
      margin-top: 12px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <canvas id="pong" width="800" height="500"></canvas>
  <div id="info">W / S — move left paddle &nbsp;|&nbsp; ↑ / ↓ — move right paddle &nbsp;|&nbsp; Enter — start / pause</div>

  <script>
    const canvas = document.getElementById('pong');
    const ctx    = canvas.getContext('2d');

    const W = canvas.width;
    const H = canvas.height;

    const PADDLE_W  = 12;
    const PADDLE_H  = 80;
    const BALL_SIZE = 10;
    const PADDLE_SPEED = 5;
    const INITIAL_BALL_SPEED = 4;

    // ── State ────────────────────────────────────────────────────────────────
    let leftScore  = 0;
    let rightScore = 0;

    const leftPaddle = {
      x: 20,
      y: H / 2 - PADDLE_H / 2,
      dy: 0,
    };

    const rightPaddle = {
      x: W - 20 - PADDLE_W,
      y: H / 2 - PADDLE_H / 2,
      dy: 0,
    };

    let ball = createBall();
    let running = false;

    function createBall() {
      const angle = (Math.random() * Math.PI / 3) - Math.PI / 6; // -30 ... +30 degrees
      const dir   = Math.random() < 0.5 ? 1 : -1;
      return {
        x:  W / 2,
        y:  H / 2,
        dx: dir * INITIAL_BALL_SPEED * Math.cos(angle),
        dy: INITIAL_BALL_SPEED * Math.sin(angle),
        speed: INITIAL_BALL_SPEED,
      };
    }

    // ── Input ────────────────────────────────────────────────────────────────
    const keys = {};

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'Enter') {
        running = !running;
        if (running && !animFrameId) loop();
      }
      // Prevent page scroll for arrow keys
      if (['ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
    });

    document.addEventListener('keyup', e => { keys[e.key] = false; });

    // ── Update ───────────────────────────────────────────────────────────────
    function update() {
      // Left paddle (W / S)
      if (keys['w'] || keys['W']) leftPaddle.dy = -PADDLE_SPEED;
      else if (keys['s'] || keys['S']) leftPaddle.dy =  PADDLE_SPEED;
      else leftPaddle.dy = 0;

      // Right paddle (↑ / ↓)
      if (keys['ArrowUp'])   rightPaddle.dy = -PADDLE_SPEED;
      else if (keys['ArrowDown']) rightPaddle.dy =  PADDLE_SPEED;
      else rightPaddle.dy = 0;

      leftPaddle.y  = Math.max(0, Math.min(H - PADDLE_H, leftPaddle.y  + leftPaddle.dy));
      rightPaddle.y = Math.max(0, Math.min(H - PADDLE_H, rightPaddle.y + rightPaddle.dy));

      // Ball movement
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Top / bottom wall bounce
      if (ball.y <= 0) { ball.y = 0; ball.dy = Math.abs(ball.dy); }
      if (ball.y + BALL_SIZE >= H) { ball.y = H - BALL_SIZE; ball.dy = -Math.abs(ball.dy); }

      // Left paddle collision
      if (
        ball.dx < 0 &&
        ball.x <= leftPaddle.x + PADDLE_W &&
        ball.x >= leftPaddle.x &&
        ball.y + BALL_SIZE >= leftPaddle.y &&
        ball.y <= leftPaddle.y + PADDLE_H
      ) {
        ball.x  = leftPaddle.x + PADDLE_W;
        bounceBall(ball, leftPaddle);
      }

      // Right paddle collision
      if (
        ball.dx > 0 &&
        ball.x + BALL_SIZE >= rightPaddle.x &&
        ball.x + BALL_SIZE <= rightPaddle.x + PADDLE_W &&
        ball.y + BALL_SIZE >= rightPaddle.y &&
        ball.y <= rightPaddle.y + PADDLE_H
      ) {
        ball.x  = rightPaddle.x - BALL_SIZE;
        bounceBall(ball, rightPaddle);
      }

      // Scoring
      if (ball.x + BALL_SIZE < 0) {
        rightScore++;
        resetBall();
      } else if (ball.x > W) {
        leftScore++;
        resetBall();
      }
    }

    function bounceBall(ball, paddle) {
      // Offset from paddle center (-0.5 … +0.5)
      const offset = (ball.y + BALL_SIZE / 2 - (paddle.y + PADDLE_H / 2)) / PADDLE_H;
      const angle  = offset * (Math.PI / 3); // max ±60°
      const dir    = ball.dx > 0 ? -1 : 1;
      ball.speed   = Math.min(ball.speed + 0.3, 14);
      ball.dx      = dir * ball.speed * Math.cos(angle);
      ball.dy      = ball.speed * Math.sin(angle);
    }

    function resetBall() {
      running = false;
      ball = createBall();
      leftPaddle.y  = H / 2 - PADDLE_H / 2;
      rightPaddle.y = H / 2 - PADDLE_H / 2;
    }

    // ── Draw ─────────────────────────────────────────────────────────────────
    function draw() {
      // Background
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      // Center dashed line
      ctx.setLineDash([10, 10]);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Paddles
      ctx.fillStyle = '#fff';
      ctx.fillRect(leftPaddle.x,  leftPaddle.y,  PADDLE_W, PADDLE_H);
      ctx.fillRect(rightPaddle.x, rightPaddle.y, PADDLE_W, PADDLE_H);

      // Ball
      ctx.fillStyle = '#fff';
      ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);

      // Scores
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.fillText(leftScore,  W / 4,     60);
      ctx.fillText(rightScore, W * 3 / 4, 60);

      // Overlay when paused
      if (!running) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = '28px monospace';
        ctx.fillText('Press Enter to ' + (leftScore + rightScore === 0 ? 'Start' : 'Resume'), W / 2, H / 2);
      }
    }

    // ── Loop ─────────────────────────────────────────────────────────────────
    let animFrameId = null;

    function loop() {
      if (running) update();
      draw();
      animFrameId = requestAnimationFrame(loop);
    }

    // Initial render (shows "Press Enter to Start")
    draw();
  </script>
</body>
</html>
